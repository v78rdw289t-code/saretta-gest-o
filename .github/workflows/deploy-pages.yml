name: Deploy para GitHub Pages

# Publica a branch de produção (main) no GitHub Pages.
# As versões novas são desenvolvidas em outras branches e mescladas na
# main quando for publicar. O grupo de concorrência serializa os deploys
# e evita o erro "Deployment failed, try again later".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages (fonte = GitHub Actions)
        uses: actions/configure-pages@v5

      - name: Empacotar site (raiz do repositório)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
